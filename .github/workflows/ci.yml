name: CI

on:
  push:
    branches: [main]
    tags: ['v*']
    paths-ignore:
      - '**.md'
      - '.gitignore'
      - 'LICENSE'
  pull_request:
    branches: [main]

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}/mlflow

jobs:
  # ── Shell script linting ─────────────────────────────────────────────────────
  lint-scripts:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Run ShellCheck
        uses: ludeeus/action-shellcheck@master
        env:
          SHELLCHECK_OPTS: --severity=warning
        with:
          scandir: './scripts'
          format: tty

  # ── Build & Push Docker image to GHCR ────────────────────────────────────────
  build-and-push:
    needs: lint-scripts
    if: github.event_name == 'push'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=sha,prefix=,format=short
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push image
        uses: docker/build-push-action@v6
        with:
          context: ./mlflow
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ── Trigger Coolify deployment ────────────────────────────────────────────────
  deploy:
    needs: build-and-push
    runs-on: ubuntu-latest
    if: ${{ vars.COOLIFY_DEPLOY_UUID != '' && vars.COOLIFY_URL != '' }}
    steps:
      - name: Trigger Coolify deployment
        run: |
          echo "→ Disparando deploy en Coolify (uuid=${{ vars.COOLIFY_DEPLOY_UUID }})..."
          HTTP_CODE=$(curl -s -o /tmp/coolify-deploy.json -w "%{http_code}" \
            -X GET \
            "${{ vars.COOLIFY_URL }}/api/v1/deploy?uuid=${{ vars.COOLIFY_DEPLOY_UUID }}&force=false" \
            -H "Authorization: Bearer ${{ secrets.COOLIFY_TOKEN }}" \
            --max-time 30)
          echo "← Coolify respondió HTTP ${HTTP_CODE}"
          cat /tmp/coolify-deploy.json
          if [ "$HTTP_CODE" -ge 200 ] && [ "$HTTP_CODE" -lt 300 ]; then
            echo "✓ Deploy disparado correctamente"
          else
            echo "! Coolify devolvió código ${HTTP_CODE} — revisa el webhook"
            exit 1
          fi

# ──────────────────────────────────────────────────────────────────────────────
# docker-compose.yml — MLflow Production Stack
#
# Servicios:
#   postgres    — Backend de metadatos (experimentos, runs, métricas, params)
#   minio       — Almacenamiento de artefactos S3-compatible (modelos, plots)
#   minio-init  — Contenedor de inicialización: crea el bucket en el primer arranque
#   mlflow      — Servidor de tracking con autenticación nativa multi-usuario
#
# TLS y routing: gestionados por Coolify (Traefik). No se incluye nginx ni certbot.
# Los labels de Traefik en el servicio mlflow indican a Coolify qué dominio
# enrutar y qué certificado TLS obtener automáticamente.
#
# Uso:
#   Primera vez:    ./scripts/setup.sh
#   Arrancar stack: docker compose up -d
#   Ver logs:       docker compose logs -f
#   Parar stack:    docker compose down
# ──────────────────────────────────────────────────────────────────────────────

services:

  # ── PostgreSQL ──────────────────────────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    container_name: mlflow_postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      # Volumen persistente para los datos de PostgreSQL
      - postgres_data:/var/lib/postgresql/data
    networks:
      - mlflow_net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  # ── MinIO (almacenamiento de artefactos) ────────────────────────────────────
  minio:
    image: minio/minio:RELEASE.2025-04-22T22-12-26Z
    container_name: mlflow_minio
    restart: unless-stopped
    # :9000 API S3 (usado internamente por MLflow)
    # :9001 Consola web de administración de MinIO
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD}
    volumes:
      - minio_data:/data
    networks:
      - mlflow_net
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  # ── MinIO Init (crea el bucket en el primer arranque) ───────────────────────
  # Se ejecuta una sola vez y sale. El flag --ignore-existing lo hace idempotente:
  # si el bucket ya existe en arranques posteriores, no falla.
  minio-init:
    image: minio/mc:latest
    container_name: mlflow_minio_init
    depends_on:
      minio:
        condition: service_healthy
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD}
      MINIO_BUCKET: ${MINIO_BUCKET}
    entrypoint: >
      /bin/sh -c "
        mc alias set local http://minio:9000 $$MINIO_ROOT_USER $$MINIO_ROOT_PASSWORD &&
        mc mb --ignore-existing local/$$MINIO_BUCKET &&
        echo 'Bucket listo: '$$MINIO_BUCKET
      "
    networks:
      - mlflow_net
    restart: "no"

  # ── MLflow Tracking Server ──────────────────────────────────────────────────
  mlflow:
    build:
      context: ./mlflow
      dockerfile: Dockerfile
    image: mlflow_server:local
    container_name: mlflow_server
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      minio:
        condition: service_healthy
    environment:
      # Backend store: PostgreSQL
      # Usar el nombre del contenedor (mlflow_postgres) en lugar del servicio (postgres) para evitar
      # conflicto DNS con coolify-db en la red 'coolify', que también responde al hostname 'postgres'
      MLFLOW_BACKEND_STORE_URI: postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@mlflow_postgres:5432/${POSTGRES_DB}
      # Credenciales de PostgreSQL para generar basic_auth.ini en el entrypoint
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
      # Almacenamiento de artefactos: MinIO (protocolo S3)
      MLFLOW_ARTIFACTS_DESTINATION: s3://${MINIO_BUCKET}
      MINIO_BUCKET: ${MINIO_BUCKET}
      MLFLOW_S3_ENDPOINT_URL: http://minio:9000
      AWS_ACCESS_KEY_ID: ${MINIO_ROOT_USER}
      AWS_SECRET_ACCESS_KEY: ${MINIO_ROOT_PASSWORD}
      # Autenticación nativa MLflow
      MLFLOW_ADMIN_USERNAME: ${MLFLOW_ADMIN_USERNAME}
      MLFLOW_ADMIN_PASSWORD: ${MLFLOW_ADMIN_PASSWORD}
      # Clave secreta de Flask para firmar cookies de sesión de la UI
      MLFLOW_FLASK_SERVER_SECRET_KEY: ${MLFLOW_SECRET_KEY}
    networks:
      - mlflow_net
      # Conectar a la red de Coolify para que Traefik pueda enrutar el tráfico
      - coolify
    labels:
      # Activar Traefik para este servicio
      - traefik.enable=true
      # Red que Traefik debe usar para alcanzar el contenedor (evita ambigüedad al estar en dos redes)
      - traefik.docker.network=coolify
      # Enrutar el dominio a este contenedor
      - traefik.http.routers.mlflow.rule=Host(`${DOMAIN}`)
      # Usar el entrypoint HTTPS de Traefik (puerto 443)
      - traefik.http.routers.mlflow.entrypoints=https
      # Activar TLS con el resolver de Let's Encrypt de Coolify
      - traefik.http.routers.mlflow.tls=true
      - traefik.http.routers.mlflow.tls.certresolver=letsencrypt
      # Puerto interno al que Traefik hace proxy dentro del contenedor
      - traefik.http.services.mlflow.loadbalancer.server.port=5000

# ── Volúmenes persistentes ──────────────────────────────────────────────────
volumes:
  postgres_data:
    driver: local
  minio_data:
    driver: local

# ── Redes ───────────────────────────────────────────────────────────────────
networks:
  # Red interna del stack (postgres, minio y mlflow se comunican aquí)
  mlflow_net:
    driver: bridge
  # Red externa de Coolify — Traefik descubre los contenedores conectados a ella
  coolify:
    external: true

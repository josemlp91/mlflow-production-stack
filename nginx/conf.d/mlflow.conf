# ──────────────────────────────────────────────────────────────────────────────
# mlflow.conf — Configuración Nginx para el MLflow Production Stack
#
# Puerto 80 (HTTP):
#   - Sirve el challenge ACME de Let's Encrypt para la renovación de certificados
#   - Redirige el resto del tráfico a HTTPS
#
# Puerto 443 (HTTPS):
#   - Termina TLS con certificados Let's Encrypt
#   - Hace proxy al servidor MLflow en el puerto 5000
#
# Dominio: xapilopex.es (corresponde a la variable DOMAIN en .env)
# ──────────────────────────────────────────────────────────────────────────────

# ── HTTP: ACME challenge + redirect a HTTPS ───────────────────────────────────
server {
    listen 80;
    listen [::]:80;
    server_name xapilopex.es;

    # Certbot deposita aquí el token del challenge durante la renovación.
    # Nginx sirve este directorio para que Let's Encrypt pueda verificar el dominio.
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    # Todo el tráfico HTTP que no sea el challenge ACME va a HTTPS
    location / {
        return 301 https://$host$request_uri;
    }
}

# ── HTTPS: terminación TLS + proxy a MLflow ───────────────────────────────────
server {
    listen 443 ssl;
    listen [::]:443 ssl;
    # HTTP/2 mejora el rendimiento de la UI de MLflow (múltiples requests paralelos)
    http2 on;
    server_name xapilopex.es;

    # Certificados gestionados por Certbot / Let's Encrypt
    ssl_certificate     /etc/letsencrypt/live/xapilopex.es/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/xapilopex.es/privkey.pem;

    # Solo TLS 1.2 y 1.3 — versiones anteriores tienen vulnerabilidades conocidas
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384:ECDHE-ECDSA-CHACHA20-POLY1305:ECDHE-RSA-CHACHA20-POLY1305;
    ssl_prefer_server_ciphers off;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 1d;

    # Cabeceras de seguridad HTTP
    add_header Strict-Transport-Security "max-age=63072000; includeSubDomains" always;
    add_header X-Content-Type-Options nosniff always;
    add_header X-Frame-Options SAMEORIGIN always;
    add_header X-XSS-Protection "1; mode=block" always;

    # Aumentar límite de cuerpo para subida de artefactos grandes (modelos, datasets)
    client_max_body_size 512m;

    # ── Proxy a MLflow ────────────────────────────────────────────────────────
    location / {
        proxy_pass http://mlflow:5000;

        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Timeouts extendidos para experimentos de entrenamiento largos.
        # Los jobs de ML pueden tardar minutos en reportar su primera métrica.
        proxy_read_timeout    600s;
        proxy_send_timeout    600s;
        proxy_connect_timeout 75s;

        # Desactivar buffering para que el streaming de logs y métricas
        # llegue al cliente en tiempo real
        proxy_buffering off;
    }
}
